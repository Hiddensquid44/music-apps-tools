<p-menubar [model]="items">
    <ng-template #start>
        <p-button label="Ultimate Blindtest" (onClick)="goToPage('dashboard')"/>
    </ng-template>
    <ng-template #item let-item>
        <p-button [label]=item.label [icon]=item.icon></p-button>
    </ng-template>
    <ng-template #end>
      @if (userName) {
        <p-button [label]=userName (onClick)="loginMenu.toggle($event)"></p-button>
        <p-tiered-menu #loginMenu [model]="loginMenuItems" [popup]="true"></p-tiered-menu>
      } @else {
        <p-button label="Login" (onClick)="goToPage('login')"></p-button>
      }
    </ng-template>
</p-menubar>
